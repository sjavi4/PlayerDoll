helpCommand:
  create:
    desc: '&6Register Doll to server'
    usage: '&e<DollName> &f[skinName]'
  spawn:
    desc: '&6Call registered Doll at player position'
    usage: '&e<DollName> &f[gridded]'
  despawn:
    desc: '&6Offline Doll without Data loss'
    usage: '&e<DollName>'
  remove:
    desc: '&6Remove Doll with Data loss'
    usage: '&e<DollName>'
  tp:
    desc: '&6Teleport Doll to player'
    usage: '&e<DollName> &f[gridded]'
  menu:
    desc: "&6Open Doll's menu"
    usage: '&e<DollName>'
  share:
    desc: '&6Share Doll permission to player'
    usage: '&e<DollName> &e<PlayerName>'
  unshare:
    desc: '&6Take back Doll permission from player'
    usage: '&e<DollName> &e<PlayerName>'
  attack:
    desc: "&6Makes Doll attacks towards it's line of sight"
    usage: '&e<DollName> &f[once/continuous]$n&e<DollName> &f[interval] [interval] [offset]'
  use:
    desc: "&6Makes Doll interacts towards it's line of sight"
    usage: '&e<DollName> &f[once/continuous]$n&e<DollName> &f[interval] [interval] [offset]'
  copy:
    desc: "&6Copy other Doll's action to Doll"
    usage: '&e<DollName> &e<DollName>'
  stop:
    desc: '&6Stop Doll Action'
    usage: '&e<DollName> &f[all/movement]'
  slot:
    desc: '&6Set Handheld Slot'
    usage: '&e<DollName> &f[1-9]'
  drop:
    desc: '&6Drop Item from Slot'
    usage: '&e<DollName> &f[1-36/helmet/chestplate/leggings/boots/offhand/everything] [stack]$n&e<DollName> &f[once/continuous] [stack]$n&e<DollName> &f[interval] [stack] [interval] [offset]'
  sneak:
    desc: '&6Toggle Doll to (un)sneak'
    usage: '&e<DollName> &f[true/false]'
  sprint:
    desc: '&6Toggle Doll to (un)sprint'
    usage: '&e<DollName> &f[true/false]'
  mount:
    desc: '&6Set Doll rides on nearby vehicle/entity'
    usage: '&e<DollName>'
  dismount:
    desc: '&6Set Doll gets off from current vehicle/entity'
    usage: '&e<DollName>'
  turn:
    desc: "&6Rotate Doll's camera by a certain degree of yaw(horizontal) and pitch(vertical)"
    usage: '&e<DollName> &e<[+/-]yaw> <[+/-]pitch>'
  look:
    desc: "&6Set Doll's camera to specific orientation"
    usage: '&e<DollName> &e<[+/-]yaw> <[+/-]pitch>$n&e<DollName> &e<direction/player>'
  lookat:
    desc: "&6Set Doll's camera towards player/coordinates"
    usage: '&e<DollName> &e<X> <Y> <Z>$n&e<DollName> &e<player>'
  jump:
    desc: '&6Set Doll jump'
    usage: '&e<DollName> &f[once/continuous]$n&e<DollName> &f[interval] [interval] [offset]'
  strafe:
    desc: '&6Set Doll move towards left or right'
    usage: '&e<DollName> &f[left/right]'
  move:
    desc: '&6Set Doll move forwards or backwards'
    usage: '&e<DollName> &f[forwards/backwards]'
  swap:
    desc: '&6Swap Doll hands'
    usage: '&e<DollName>'
  gset:
    desc: '&6Set permission for All players'
    usage: '&e<DollName>$n*This will be overridden by pset'
  pset:
    desc: '&6Set permission for Specific player'
    usage: '&e<DollName> <player>$n*This will override gset'
  info:
    desc: '&6Show Doll data'
    usage: '&6info &e<DollName>'
  set:
    desc: '&6Set Doll settings'
    usage: '&6set &e<DollName>'
  inv:
    desc: '&6Show Doll inventory'
    usage: '&6inv &e<DollName>'
  exp:
    desc: '&6Get Exp from Doll'
    usage: '&6exp &e<DollName> [all/level]'

